# mise task runner + toolchain for etherip-xdp.
# List tasks with `mise tasks`; run with `mise run <task>`.

[tools]
actionlint = "latest"
# bpf-linker is required to build the eBPF object (see build.rs / aya-build).
"cargo:bpf-linker" = "latest"
# cargo-fuzz drives the data-path fuzz targets under fuzz/ (needs nightly).
"cargo:cargo-fuzz" = "latest"
pinact = "latest"
zizmor = "latest"

[tasks.build]
description = "Build the release binary (also builds the eBPF object)"
run = "cargo build --release"

[tasks.test]
description = "Host unit tests (no root required)"
run = "cargo test -p etherip-xdp -p etherip-xdp-common"

[tasks.test-bpf]
description = "Byte-exact eBPF data-path tests (BPF_PROG_TEST_RUN; needs root + kernel >= 5.15)"
run = '''
cargo test -p etherip-xdp --test data_path --no-run
sudo -E "$(ls -t target/debug/deps/data_path-* | grep -vE '\.(d|so)$' | head -1)" --ignored --test-threads=1
'''

[tasks.lint]
description = "Clippy (must pass before commit)"
run = "cargo clippy --all-targets --workspace --exclude etherip-xdp-ebpf -- -D warnings"

[tasks.fuzz]
description = "Coverage-guided fuzzing of the data-path core (cargo-fuzz; needs nightly). Target: decap|encap|roundtrip"
# Pin --target to the rustc host triple: the mise-provided (cargo-binstall'd)
# cargo-fuzz is a musl build and otherwise defaults to its own musl triple, where
# the sanitizer can't link (static libc) and std isn't installed.
run = '''
cargo +nightly fuzz run --fuzz-dir test/fuzzing --target "$(rustc -vV | sed -n 's/^host: //p')" {{arg(name="target", default="roundtrip")}}
'''

[tasks.integration-vm]
description = "Download mainline kernels (6.5/6.8/7.0) and run the 2-VM integration test"
run = '''
.github/scripts/download_kernel_images.sh tmp/integration/kernels 6.5 6.8 7.0
cargo xtask integration-test vm tmp/integration/kernels/*.deb
'''

[tasks.integration-local]
description = "Run the 2-netns integration test on the host (needs root via sudo)"
run = 'sudo -E env "PATH=$PATH" "$(command -v cargo)" xtask integration-test local'

[tasks.integration-freebsd]
description = "FreeBSD native-EtherIP interop test (downloads kernel 6.8 + FreeBSD VM image)"
run = '''
.github/scripts/download_kernel_images.sh tmp/integration/kernels 6.8
cargo xtask integration-test freebsd-interop tmp/integration/kernels/*6.8*.deb
'''

[tasks.fmt]
description = "Format the workspace"
run = "cargo fmt"

[tasks.run]
description = "Run against an interface locally (requires root); reads /etc/etherip-xdp/interfaces.d/<iface>"
run = 'cargo build --release && sudo -E ./target/release/etherip-xdp {{arg(name="iface", default="eth1")}}'

[tasks.install]
description = "Install the binary and systemd unit"
run = '''
install -Dm0755 target/release/etherip-xdp /usr/local/bin/etherip-xdp
install -Dm0644 packaging/etherip-xdp@.service /etc/systemd/system/etherip-xdp@.service
'''
