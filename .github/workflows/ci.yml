name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: 00 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yml

  integration:
    permissions:
      contents: read
    uses: ./.github/workflows/_integration.yml

  # Nightly .deb packages uploaded as artifacts (deb-amd64 / deb-arm64). Built on
  # main pushes and the nightly schedule; skipped on PRs (no artifact consumers).
  deb:
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/_deb.yml
