name: release

# Cut a GitHub release with cargo-deb packages, gated on the full test suite.
#
# Triggered by pushing a `rel/YYYY.MM.DD` tag. The unit/data-path tests
# (_test.yml), the VM/netns/FreeBSD integration tests (_integration.yml), and the
# cargo-deb build (_deb.yml) run as reusable workflows in parallel; the release
# is only attested and a draft published once all of them pass. A human reviews
# and finalizes (publishes) the draft.
on:
  push:
    tags:
      - 'rel/*'

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yml

  integration:
    permissions:
      contents: read
    uses: ./.github/workflows/_integration.yml

  build-deb:
    permissions:
      contents: read
    uses: ./.github/workflows/_deb.yml

  release:
    needs: [test, integration, build-deb]
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deb-*
          merge-multiple: true
          path: dist

      # Attest the downloaded packages here (rather than in the build job) so the
      # reusable _deb.yml stays a plain build-and-upload shared with CI.
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*.deb'

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft \
            dist/*.deb
