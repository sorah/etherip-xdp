name: integration

# Reusable workflow: end-to-end integration tests.
#
# `vm` boots two qemu-system-x86_64 guests joined by a -netdev stream socket
# (no host networking privileges) and tunnels between them, once per mainline
# kernel. `local` does the same on the host using two network namespaces.
on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  vm:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Mainline kernels exercised in the VM (qemu-system-x86_64).
        kernel:
          - "6.5"
          - "6.8"
          - "7.0"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Expose /dev/kvm to the runner user so qemu uses KVM (else it falls back
      # to slow TCG). See the GitHub hardware-acceleration changelog.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils

      # nightly + rust-src for aya-build's eBPF `-Z build-std`; the guest
      # binaries are static musl.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: bpf-linker

      - name: Download kernel ${{ matrix.kernel }}
        run: .github/scripts/download_kernel_images.sh tmp/integration/kernels ${{ matrix.kernel }}

      - name: Run VM integration test (kernel ${{ matrix.kernel }})
        run: cargo xtask integration-test vm tmp/integration/kernels/*.deb

  local:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: bpf-linker

      # The netns setup needs CAP_NET_ADMIN; -E keeps HOME/CARGO and the PATH is
      # passed explicitly so rustup/cargo/bpf-linker resolve under sudo.
      - name: Run local (netns) integration test
        run: sudo -E env "PATH=$PATH" "$(command -v cargo)" xtask integration-test local

  freebsd-interop:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: bpf-linker

      # Cache the FreeBSD VM image (~400 MB) across runs; xtask downloads it on miss.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tmp/integration/freebsd
          key: freebsd-image-v0.14.0

      - name: Download Linux kernel 6.8
        run: .github/scripts/download_kernel_images.sh tmp/integration/kernels 6.8

      - name: Run FreeBSD EtherIP interop test
        run: cargo xtask integration-test freebsd-interop tmp/integration/kernels/*.deb
